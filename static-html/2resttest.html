    </div><!-- .big-title-frame 닫는 태그 -->
  
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // 모든 질문 블록 선택
        const questionBlocks = document.querySelectorAll('.question-block');
  
        // 각 블록 안의 라디오 버튼 변경 감지
        questionBlocks.forEach(block => {
          block.addEventListener('change', checkAllAnswered);
        });
  
        function checkAllAnswered() {
          // 모든 질문 블록마다 하나씩 답이 선택되었는지 확인
          const allDone = Array.from(questionBlocks).every(block =>
            block.querySelector('input[type="radio"]:checked')
          );
          if (allDone) {
            // 1초(1000ms) 후에 다음 페이지로 이동
            setTimeout(() => {
              window.location.href = '3resttest.html';
            }, 1000);
          }
        }
      });
    </script>
