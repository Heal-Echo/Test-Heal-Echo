## 0. Owner Profile

### 개발 경험
- 웹/앱 개발 경험 없음 (비개발자)
- AI 도구를 활용하여 서비스를 직접 구축 중
- 터미널 명령어, 코드 수정, AWS 콘솔 조작은 가능하나 단계별 안내가 필요

### 소통 원칙
- 기술 용어 사용 시 간결한 설명을 함께 제공
- 터미널 명령어는 복사-붙여넣기 가능한 형태로 제공
- “이걸 실행하세요”가 아니라 “어디서, 무엇을, 왜” 순서로 안내
- 여러 선택지가 있을 때는 가장 단순한 방법을 우선 제시
- AWS 콘솔 작업이 필요한 경우 검색 경로부터 안내

