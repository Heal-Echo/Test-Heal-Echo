## 1. Project Overview

### Purpose
- 웰니스 솔루션을 제공하는 사용자 중심 서비스 구축
- 영상 기반 프로그램 제공
  - Weekly Solution (주차별 자율신경 밸런스 영상)
  - Introduction
- 수면 습관 형성 프로그램
  - Weekly Habit (PSQI 기반 수면 품질 진단 + 주차별 습관 콘텐츠)
- 명상/몰입 프로그램
  - “이해의 바다 (Sea of Understanding)”
- 자가 체크 시스템
  - 자율신경 건강 상태 자가 진단 (불균형 신호 측정)
  - PSQI 수면 품질 지수 자가 진단
- 사용자 입력 기반 기능 구현 예정
  - 식단 관리표
  - Habit Tracker
  - 기타 쓰기 기반 기능

### Target Platforms
- Web / Web App (Next.js 기반)
- Android 앱 (향후 개발 예정)
- iOS 앱 (향후 개발 예정)
- 스마트폰 및 태블릿 환경 지원 (모바일 최적화: max-width 480px)

