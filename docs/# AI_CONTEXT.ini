## 3. AWS & Infrastructure

### AWS Services in Use
- Amazon S3 (영상/이미지 저장)
- Amazon CloudFront (콘텐츠 배포)
- AWS Lambda (비즈니스 로직)
- Amazon API Gateway (HTTP API)
- Amazon DynamoDB (데이터 저장)
- Amazon Cognito (인증)
- AWS CDK (인프라 코드: `healecho-infra/lib/HealechoStack.ts`)

### DynamoDB Tables
- SubscriptionsTable: 구독 상태 관리 (userId + programId)
- PaymentsTable: 결제/빌링키 관리 (userId + paymentId)
- WatchRecordsTable: 시청 기록
- UsersTable: 사용자 프로필
- UserHabitTrackingTable: 습관 추적
- PracticeRecordTable: 실천 기록 (solution/habit/understanding)

### Deployment
- CDK 기반 Lambda 배포: `cd healecho-infra && cdk deploy`
- 프론트엔드 수동 배포 (Manual): `npm run build`
- CI/CD 파이프라인 미구성

### Authentication
- 존재함
- Amazon Cognito 기반
  - User Pool (`ap-northeast-2_68VMdEqHX`)
  - Client ID
- 관리자 / 사용자 접근 분리 구조 (이중 인증 경로)

#### 일반 사용자 (Type A)
- 토큰 저장: `storage.getRaw(“user_id_token”)` 경유 (내부적으로 localStorage 사용, 앱 전환 시 교체 가능)
- 전달 방식: 프론트엔드에서 `Authorization: Bearer <token>` 헤더로 전송
- API 프록시(Next.js Route)에서 `req.headers.get(“authorization”)`으로 추출

#### 관리자
- 토큰 저장: httpOnly cookie → 키: `heal_admin_auth`
- 전달 방식: 브라우저가 자동으로 쿠키 전송
- API 프록시에서 `cookies().get(cookieName)`으로 추출

#### API 프록시 인증 패턴 (중요)
- 올바른 패턴 (Pattern A): Authorization 헤더 우선 → 쿠키 폴백
- 잘못된 패턴 (Pattern C): 쿠키만 읽음 → 일반 사용자 인증 실패 (401)
- 모든 `/api/user/*`, `/api/public/*` 프록시 라우트는 반드시 Pattern A를 사용해야 함
- 관련 문서: `docs/auth-token-fix-summary.md`

