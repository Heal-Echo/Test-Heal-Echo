### 스토리지 추상화 레이어 (v8 — localStorage/sessionStorage/cookie/Cognito SDK 추상화, 2026-03-22)
- `src/lib/storage.ts` — localStorage + sessionStorage + cookie + Cognito SDK Storage 추상화 레이어
  - 모든 사용자 데이터 키에 userId(JWT sub)를 자동 포함하여 계정별 격리
  - 향후 앱 전환 시 이 파일의 내부 구현만 교체 (localStorage → AsyncStorage, sessionStorage → 인메모리 Map 등)
  - 주요 함수: `get/set/remove` (userId 자동 포함), `getRaw/setRaw/removeRaw` (공통 키용), `getJSON/setJSON`, `clearUserData()`, `migrateKey()`, `getSession/setSession/removeSession/clearSession`, `getCookie/deleteCookie`, `cognitoStorageAdapter`
- 설계 문서: `docs/storage-migration-plan.md`
- 데이터 맵: `docs/localStorage-vs-AWS-data-map.md`
- 적용 현황: Phase 1~9를 통해 **대부분의 localStorage 직접 호출 → storage.ts 추상화 레이어 전환, 단 일부 누락 영역 존재**
  - Phase 1~9: 페이지/컴포넌트/auth 모듈의 localStorage 직접 호출 전환 (상세: `docs/prompt-storage-migration-phase9.md`)
  - 추가 전환: cookie 추상화(`getCookie/deleteCookie`), Cognito SDK Storage 어댑터(`cognitoStorageAdapter`)
  - ⚠️ 남은 영역: `storage.ts` 내부 `clearUserData()` 동적 키 열거 시 `localStorage.length/key()` 직접 사용 (향후 키 레지스트리 패턴 필요)
- ✅ sessionStorage 추상화: 프로젝트 전체 11개 파일 전환 완료 (직접 호출 0건, storage.ts 내부 제외)
- 현재 단계: 모바일 웹/앱 연동 준비 상태 검토 — `docs/prompt-mobile-app-readiness-review.md`
- 원칙: **AWS가 원본(source of truth), localStorage는 캐시** — 읽기 시 AWS 먼저 조회, 실패 시 로컬 폴백

