## 8. AI Interaction Rules

### 작업 절차 (필수)
- **한 번에 한 단계씩 작업**합니다
- 하나의 작업을 수행한 후, 수행한 작업에 대해 설명합니다
- 그 다음 작업이 무엇인지 설명합니다
- 반드시 **'승인'을 받은 후** 다음 작업을 진행합니다
- 승인 없이 여러 단계를 연속으로 진행하지 않습니다

### Response Principles
- 설계 또는 코드 작성 전에 구조 파악 필수
- 작업 전 반드시 파일 요청
- 전체 코드 확인 후 다음 단계 진행
- 하나의 원인 → 하나의 검증 → 다음 단계
- 추측 금지

### Code Modification Policy
- 수정 사유를 먼저 설명
- 사용자 동의 후 수정 진행
- 변경 범위에 따라 적절한 방식 선택:
  - **작은 변경** (몇 줄 수정/추가): Edit 도구로 부분 수정 (변경 부분만 정밀 교체, 나머지 코드 안전)
  - **큰 변경** (파일 구조 자체가 바뀔 때): Write 도구로 전체 교체
- 어떤 방식을 사용하든, 변경 전후를 명확히 설명

### Lambda 변경 시 주의사항
- Lambda 코드 수정 후에는 `cd healecho-infra && cdk deploy`가 필요
- 프론트엔드(Next.js) 코드 수정은 dev 서버 자동 반영 (HMR)
- DynamoDB 데이터 직접 수정은 `aws dynamodb update-item` CLI 사용

