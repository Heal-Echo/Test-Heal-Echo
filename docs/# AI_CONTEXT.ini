## 6. Security Rules (Critical)

### Absolute Prohibitions
- 정상 동작 중인 로직을 임의로 수정하는 행위 금지
- 추측 기반 구조 변경 금지
- 제공되지 않은 파일을 기준으로 판단 금지
- 부분 코드 수정(diff) 방식 제시 금지
- AWS Access Key / Secret Key 하드코딩 금지

### Sensitive Information Handling
- 민감 정보는 환경 변수로만 관리
  - `.env`
  - `.env.local`
- 프론트엔드 / 백엔드 코드에 AWS Key 직접 포함 ❌

#### Environment Variable Policy
- API Gateway URL, CloudFront Domain → 환경 변수
- Cognito User Pool ID / Client ID / Region → 환경 변수
- `NEXT_PUBLIC_*` 변수
  - 클라이언트에서 참조 가능한 공개 정보만 사용

#### AWS Access Policy
- Access Key 직접 사용 ❌
- IAM Role + API Gateway + Lambda 구조 사용 ⭕️

