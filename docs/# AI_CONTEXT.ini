## 4. Subscription & Payment System

### 결제 시스템
- 토스페이먼츠 (Toss Payments) 빌링키 방식
- 빌링키 발급 → 무료 체험 → 자동 결제 전환 구조
- Lambda: `billing-issue-key.ts`, `billing-charge.ts`, `billing-cancel.ts`, `billing-info.ts`

### 구독 유형 (subscriptionType)
- `browser`: 미가입 방문자
- `browser_selected`: 솔루션 선택 완료, 미결제
- `free_trial`: 7일 무료 체험 중 (빌링키 발급 완료)
- `paid`: 유료 구독 중
- `paid_stopped`: 유료 구독 해지 (결제 주기 종료 후)
- `free_stopped`: 무료 체험 해지

### 고객 여정 흐름
- browser → browser_selected → free_trial (7일) → paid
- 각 단계별 구독 관리 페이지(`mypage/settings/subscription`)의 UI가 다름
- free_trial/paid: 동기부여 메시지, 웰니스 대시보드, 결제 정보, 활동 요약 표시

### 동기부여 메시지 / 결제 수단 (참고)
- 동기부여 메시지: free_trial 16패턴, paid 9패턴 — 설계 문서 참조 (`docs/paid-motivation-messages.md`, `docs/trial-day1-3-motivation-messages.md`)
- 결제 수단 표시: `CardBrandIcon` 컴포넌트 + `billing-issue-key.ts` Lambda (토스 `card.issuerCode` 매핑)

